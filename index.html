        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Syncopate:wght@700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Syncopate', sans-serif;
            overflow: hidden;
        }

        /* GRITTY VIDEO ENGINE */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

        .video-background iframe {
            width: 100vw;
            height: 100vh;
            transform: scale(1.5);
            pointer-events: none;
        }

        /* MAIN UI LAYOUT */
        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.8) 100%);

        }

        .band-logo {

            font-size: 0.7rem;
            letter-spacing: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;

        /* NAVIGATION BUTTONS */
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            border: 2px solid #fff;
            padding: 18px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #ff0000;
            border-color: #ff0000;
            color: #fff;
            transform: scale(1.05);
        }

        .btn-epk {
            border-color: #ff0000;
            color: #ff0000;
            font-weight: bold;
        }

        /* FOOTER */
        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            opacity: 0.5;
            letter-spacing: 3px;
        }
    </style>
</head>
